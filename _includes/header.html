<header class="site-header" role="banner">
  <div class="site-header__inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} — home">
      <img src="{{ '/assets/images/arch-small.svg' | relative_url }}"
           alt="" aria-hidden="true"
           class="site-logo__icon">
      <div class="site-logo__text">
        <span class="site-logo__wordmark">Telos</span>
        <span class="site-logo__subtitle">{{ site.tagline }}</span>
      </div>
    </a>

    <nav class="site-nav" aria-label="Main navigation" id="site-nav-menu">
      <a href="{{ '/about/' | relative_url }}"
         class="site-nav__link{% if page.url == '/about/' %} active{% endif %}">
        About
      </a>
      <a href="{{ '/issues/' | relative_url }}"
         class="site-nav__link{% if page.url contains '/issues' %} active{% endif %}">
        Issues
      </a>
      <a href="{{ '/forum/' | relative_url }}"
         class="site-nav__link{% if page.url contains '/forum' %} active{% endif %}">
        The Forum
      </a>
      <a href="{{ '/submit/' | relative_url }}"
         class="site-nav__link{% if page.url == '/submit/' %} active{% endif %}">
        Submit
      </a>
    </nav>

    <button class="site-nav-toggle"
            type="button"
            aria-label="Toggle navigation"
            aria-expanded="false"
            aria-controls="site-nav-menu">
      <span class="site-nav-toggle__line"></span>
      <span class="site-nav-toggle__line"></span>
      <span class="site-nav-toggle__line"></span>
    </button>

  </div>
</header>
